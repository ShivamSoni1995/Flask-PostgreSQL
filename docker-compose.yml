# Note: no `version` key — it is obsolete in Docker Compose v2+
services:
  web:
    image: ${ECR_IMAGE}   # set via .env or environment — e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com/flask-app:latest
    env_file: .env
    expose:
      - "5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

networks:
  backend:
    driver: bridge
