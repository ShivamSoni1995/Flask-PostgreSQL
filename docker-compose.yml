version: "3.9"

services:
  # ── Flask application (Gunicorn) ──────────────────────────────────────────
  web:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: flask-app:latest
    env_file: .env          # DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
    expose:
      - "5000"              # Internal only — Nginx is the only entry point
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - backend

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"             # Only port exposed to the host / internet
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

networks:
  backend:
    driver: bridge
