worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json;

    # Rate limiting — protect the Flask app from bursts
    limit_req_zone $binary_remote_addr zone=flask_limit:10m rate=30r/s;

    upstream flask_app {
        server web:5000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # Pass real client information to the Flask app
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header   Connection "";   # enable HTTP keep-alives to upstream

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        location / {
            limit_req zone=flask_limit burst=50 nodelay;
            proxy_pass http://flask_app;
        }

        location /health {
            # Health checks bypass rate limiting
            proxy_pass http://flask_app;
            access_log off;
        }
    }
}
